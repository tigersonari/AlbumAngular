<div class="container">

  <h2>Cadastro de Álbum</h2>

  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>

  <form [formGroup]="form">

    <div>
      <input formControlName="titulo" placeholder="Título">
    </div>

    <div>
      <input formControlName="descricao" placeholder="Descrição">
    </div>

    <div>
      <label>Lançamento</label>
      <input type="date" formControlName="lancamento">
    </div>

    <h3>Imagem do produto</h3>

    <input
      type="file"
      accept="image/*"
      (change)="uploadCapa($event)">

    <div *ngIf="capaUrl">
      <p>Capa enviada:</p>
      <img [src]="capaUrl" width="160">
    </div>

    <div>
      <label>Formato</label>
      <select formControlName="idFormato">
        <option [ngValue]="null">Selecione o formato</option>
        <option *ngFor="let f of formatos" [ngValue]="f.id">
          {{ f.nome }}
        </option>
      </select>
    </div>

    <div>
      <label>Produção</label>
      <select formControlName="idProducao">
        <option [ngValue]="null">Selecione a produção</option>
        <option *ngFor="let p of producoes" [ngValue]="p.id">
          {{ p.produtor }}
        </option>
      </select>
    </div>

    <button type="button" (click)="novaProducao()">Nova produção</button>

    <div>
      <label>Projetos Musicais</label>

      <h4>Artistas</h4>
      <div *ngFor="let a of artistas">
        <label>
          <input
            type="checkbox"
            [checked]="projetoSelecionado(a.id)"
            (change)="toggleProjeto(a.id, $event)">
          {{ a.nomeArtistico }}
        </label>
      </div>

      <h4>Grupos</h4>
      <div *ngFor="let g of grupos">
        <label>
          <input
            type="checkbox"
            [checked]="projetoSelecionado(g.id)"
            (change)="toggleProjeto(g.id, $event)">
          {{ g.nomeGrupo }}
        </label>
      </div>
    </div>

    <button type="button" (click)="novoArtista()">Novo artista</button>
    <button type="button" (click)="novoGrupo()">Novo grupo</button>

    <div>
      <label>Gêneros</label>

      <div *ngFor="let g of generos">
        <label>
          <input
            type="checkbox"
            [checked]="generoSelecionado(g.id)"
            (change)="toggleGenero(g.id, $event)">
          {{ g.nomeGenero }}
        </label>
      </div>
    </div>

    <button type="button" (click)="novoGenero()">Novo gênero</button>

    <h3>Venda</h3>

    <label>Preço</label>
    <input
      type="number"
      step="0.01"
      formControlName="preco"
      placeholder="Preço">

    <label>Quantidade em estoque</label>
    <input
      type="number"
      formControlName="quantidadeEstoque"
      placeholder="Estoque">

    <button type="button" (click)="cancelar()">Cancelar</button>

    <button type="button" (click)="salvar()" [disabled]="salvando">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>

  </form>

</div>
