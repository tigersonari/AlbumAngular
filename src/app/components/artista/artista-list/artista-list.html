<div class="container">

  <h2>Artistas</h2>

  <div>
    <input [(ngModel)]="filtro" placeholder="Buscar por nome artístico">
    <button (click)="pesquisar()">Buscar</button>
    <button (click)="novo()">Novo</button>
  </div>

  <div>
    <select [(ngModel)]="empresaFiltro">
      <option [ngValue]="null">Todas empresas</option>
      <option *ngFor="let e of empresas" [ngValue]="e.id">
        {{ e.nomeEmpresa }}
      </option>
    </select>

    <button (click)="buscarPorEmpresa()">Filtrar</button>
  </div>

  <p *ngIf="carregando">Carregando...</p>
  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>

  <table *ngIf="!carregando">
    <tr>
      <th>ID</th>
      <th>Nome artístico</th>
      <th>Nome completo</th>
      <th>Função</th>
      <th>Empresa</th>
      <th>Ações</th>
    </tr>

    <tr *ngFor="let a of artistas">
      <td>{{ a.id }}</td>
      <td>{{ a.nomeArtistico }}</td>
      <td>{{ a.nomeCompleto }}</td>
      <td>{{ a.funcaoPrincipal }}</td>
      <td>{{ a.empresa?.nomeEmpresa }}</td>
      <td>
        <button [routerLink]="['/artistas/edit', a.id]">Editar</button>
        <button (click)="deletar(a.id)">Excluir</button>
      </td>
    </tr>
  </table>

  <p *ngIf="!carregando && artistas.length === 0">
    Nenhum artista encontrado.
  </p>

  <div>
    <button (click)="anterior()" [disabled]="page === 0">Anterior</button>

    <span>
      Página {{ page + 1 }} de {{ totalPaginas() || 1 }}
    </span>

    <button
      (click)="proxima()"
      [disabled]="(page + 1) * pageSize >= total">
      Próxima
    </button>
  </div>

</div>
