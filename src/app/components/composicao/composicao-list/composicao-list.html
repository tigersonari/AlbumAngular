<div class="container">
<h2>Composições</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Data</th>
    <th>Projetos</th>
    <th>Ações</th>
  </tr>

  <tr *ngFor="let c of composicoes">
    <td>{{c.id}}</td>
    <td>{{c.data}}</td>
    <td>{{ getProjetos(c) }}</td>
    <td>
      <button [routerLink]="['/composicoes/edit', c.id]">Editar</button>
      <button (click)="excluir(c.id)">Excluir</button>
    </td>
  </tr>
</table>

<button [routerLink]="['/composicoes/new']">Nova Composição</button>
</div>
