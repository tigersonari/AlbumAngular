<div class="container">

  <h2>Cadastro de Empresa</h2>

  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>

  <form [formGroup]="form">

    <div>
      <input formControlName="nomeEmpresa" placeholder="Nome da Empresa">

      <small *ngIf="form.get('nomeEmpresa')?.touched && form.get('nomeEmpresa')?.hasError('required')">
        O nome da empresa é obrigatório.
      </small>

      <small *ngIf="form.get('nomeEmpresa')?.touched && form.get('nomeEmpresa')?.hasError('minlength')">
        O nome deve ter pelo menos 2 caracteres.
      </small>
    </div>

    <div>
      <input formControlName="cnpj" placeholder="CNPJ">

      <small *ngIf="form.get('cnpj')?.touched && form.get('cnpj')?.hasError('required')">
        O CNPJ é obrigatório.
      </small>
    </div>

    <div>
      <input formControlName="localizacao" placeholder="Localização">
    </div>

    <div>
      <input formControlName="contato" placeholder="Contato">
    </div>

    <button type="button" (click)="cancelar()">Cancelar</button>

    <button type="button" (click)="salvar()" [disabled]="salvando">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>

  </form>

</div>
