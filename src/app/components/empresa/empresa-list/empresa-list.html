<div class="container">
<h2>Empresas</h2>

<input [(ngModel)]="filtro" placeholder="Buscar por nome">
<button (click)="pesquisar()">Buscar</button>

<table>
  <tr>
    <th>ID</th>
    <th>Nome</th>
    <th>CNPJ</th>
    <th>Ações</th>
  </tr>

  <tr *ngFor="let e of empresas">
    <td>{{e.id}}</td>
    <td>{{e.nomeEmpresa}}</td>
    <td>{{e.cnpj}}</td>
    <td>
      <button [routerLink]="['/empresas/edit', e.id]">Editar</button>
      <button (click)="deletar(e.id!)">Excluir</button>
    </td>
  </tr>
</table>

<button (click)="novo()">Novo</button>

<button (click)="anterior()">Anterior</button>
<span>Página {{page + 1}}</span>
<button (click)="proxima()">Próxima</button>

</div>
