<div class="container">

  <h2>Esqueci minha senha</h2>

  <p>Informe o e-mail cadastrado na sua conta.</p>

  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>
  <p *ngIf="mensagemSucesso">{{ mensagemSucesso }}</p>

  <input
    [(ngModel)]="email"
    placeholder="E-mail"
    type="email">

  <button type="button" (click)="solicitar()">
    Gerar token de recuperação
  </button>

  <div *ngIf="tokenGerado" class="token-box">
    <p><strong>Token gerado:</strong></p>
    <textarea readonly rows="3">{{ tokenGerado }}</textarea>

    <button
      type="button"
      [routerLink]="['/redefinir-senha']"
      [queryParams]="{ token: tokenGerado }">
      Redefinir senha
    </button>
  </div>

  <button routerLink="/login">
    Voltar ao login
  </button>

</div>
