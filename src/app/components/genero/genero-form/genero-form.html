<div class="container">

  <h2>Cadastro de Gênero</h2>

  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>

  <form [formGroup]="form">

    <div>
      <input formControlName="nomeGenero" placeholder="Nome">

      <small *ngIf="form.get('nomeGenero')?.touched && form.get('nomeGenero')?.hasError('required')">
        O nome é obrigatório.
      </small>

      <small *ngIf="form.get('nomeGenero')?.touched && form.get('nomeGenero')?.hasError('minlength')">
        O nome deve ter pelo menos 2 caracteres.
      </small>
    </div>

    <div>
      <input formControlName="descricao" placeholder="Descrição">
    </div>

    <button type="button" (click)="cancelar()">Cancelar</button>

    <button type="button" (click)="salvar()" [disabled]="salvando">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>

  </form>

</div>
