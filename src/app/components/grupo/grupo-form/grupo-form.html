<div class="container">
  <h2>Cadastro de Grupo</h2>

<form [formGroup]="form">

  <input formControlName="nomeGrupo" placeholder="Nome do grupo">

  <input type="date" formControlName="dataInicio">
  <input type="date" formControlName="dataTermino">

  <label>Empresa</label>
<select formControlName="idEmpresa">
  <option *ngFor="let e of empresas" [value]="e.id">
    {{e.nomeEmpresa}}
  </option>
</select>

<label>Integrantes</label>
<select multiple formControlName="idsArtistas">
  <option *ngFor="let a of artistas" [ngValue]="a.id">
    {{a.nomeArtistico}}
  </option>
</select>

<button type="button" (click)="cancelar()">Cancelar</button>
  <button (click)="salvar()">Salvar</button>
</form>
</div>
