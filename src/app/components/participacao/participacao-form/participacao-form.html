<div class="container">

  <h2>Cadastro de Participação</h2>

  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>

  <form [formGroup]="form">

    <div>
      <input formControlName="papel" placeholder="Papel">

      <small *ngIf="form.get('papel')?.touched && form.get('papel')?.hasError('required')">
        O papel é obrigatório.
      </small>
    </div>

    <div>
      <label>
        <input type="checkbox" formControlName="destaque">
        Destaque
      </label>
    </div>

    <div>
      <label>Participantes</label>

      <h4>Artistas</h4>
      <div *ngFor="let a of artistas">
        <label>
          <input
            type="checkbox"
            [checked]="projetoSelecionado(a.id)"
            (change)="toggleProjeto(a.id, $event)">
          {{ a.nomeArtistico }}
        </label>
      </div>

      <h4>Grupos</h4>
      <div *ngFor="let g of grupos">
        <label>
          <input
            type="checkbox"
            [checked]="projetoSelecionado(g.id)"
            (change)="toggleProjeto(g.id, $event)">
          {{ g.nomeGrupo }}
        </label>
      </div>

      <small *ngIf="form.get('idsProjetoMusical')?.touched && idsSelecionados.length === 0">
        Selecione pelo menos um participante.
      </small>
    </div>

    <button type="button" (click)="cancelar()">Cancelar</button>

    <button type="button" (click)="salvar()" [disabled]="salvando">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>

  </form>

</div>
