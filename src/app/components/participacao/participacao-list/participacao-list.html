<div class="container">

  <h2>Participações</h2>

  <div>
    <input [(ngModel)]="filtro" placeholder="Buscar por papel">
    <button (click)="pesquisar()">Buscar</button>
    <button (click)="novo()">Nova Participação</button>
  </div>

  <p *ngIf="carregando">Carregando...</p>
  <p *ngIf="mensagemErro">{{ mensagemErro }}</p>

  <table *ngIf="!carregando">
    <tr>
      <th>ID</th>
      <th>Papel</th>
      <th>Destaque</th>
      <th>Participantes</th>
      <th>Ações</th>
    </tr>

    <tr *ngFor="let p of participacoes">
      <td>{{ p.id }}</td>
      <td>{{ p.papel }}</td>
      <td>{{ p.destaque ? 'Sim' : 'Não' }}</td>
      <td>{{ getParticipantes(p) }}</td>
      <td>
        <button [routerLink]="['/participacoes/edit', p.id]">Editar</button>
        <button (click)="excluir(p.id)">Excluir</button>
      </td>
    </tr>
  </table>

  <p *ngIf="!carregando && participacoes.length === 0">
    Nenhuma participação encontrada.
  </p>

</div>
